version: 2.1

executors:
  python-executor:
    docker:
      - image: cimg/python:3.11
    working_directory: ~/repo

jobs:
  test:
    executor: python-executor
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: |
            python -m venv venv
            source venv/bin/activate
            pip install -r requirements.txt
      - run:
          name: Run static analysis (ruff)
          command: |
            source venv/bin/activate
            ruff check src
      - run:
          name: Run type checking (mypy)
          command: |
            source venv/bin/activate
            mypy src
      - run:
          name: Run tests
          command: |
            source venv/bin/activate
            pytest tests --junitxml=test-results/junit.xml
      - store_test_results:
          path: test-results

workflows:
  build_and_test:
    jobs:
      - test